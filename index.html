<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>DevPortfolio | Dynamic Theme Builder</title>
  <!-- Preconnect & Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Main Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <!-- SIDEBAR – Controls Panel -->
    <aside class="sidebar">
      <div class="logo-area">
        <div class="logo-mark">&lt;/&gt;</div>
        <div>
          <h2>DevTheme Studio</h2>
          <p>live portfolio editor</p>
        </div>
      </div>

      <div class="control-group">
        <label><i class="fa-regular fa-user"></i> Full name</label>
        <input type="text" id="inputName" placeholder="Alex Morgan" autocomplete="off">
      </div>

      <div class="control-group">
        <label><i class="fa-regular fa-badge"></i> Professional title</label>
        <input type="text" id="inputTitle" placeholder="Senior Full Stack Developer">
      </div>

      <div class="control-group">
        <label><i class="fa-regular fa-pen-line"></i> Bio / summary</label>
        <textarea id="inputBio" rows="3" placeholder="Passionate engineer focused on scalable products..."></textarea>
      </div>

      <div class="control-group">
        <label><i class="fa-regular fa-image"></i> Avatar URL</label>
        <input type="text" id="inputImage" placeholder="https://randomuser.me/api/portraits/men/32.jpg">
      </div>

      <div class="control-group">
        <label><i class="fa-regular fa-envelope"></i> Email address</label>
        <input type="email" id="inputEmail" placeholder="alex@example.com">
      </div>

      <div class="control-group">
        <label><i class="fa-regular fa-location-dot"></i> Location</label>
        <input type="text" id="inputLocation" placeholder="Nairobi, Kenya">
      </div>

      <div class="control-group">
        <label><i class="fa-regular fa-tag"></i> Skills (click to remove)</label>
        <div class="skill-input-group">
          <input type="text" id="newSkillInput" placeholder="e.g., React, Figma, Go" autocomplete="off">
          <button id="addSkillBtn" class="btn-primary small" aria-label="Add skill">+ Add</button>
        </div>
        <div id="skillsTagContainer" class="tags-container"></div>
      </div>

      <div class="divider"></div>

      <div class="action-buttons">
        <button id="exportDataBtn" class="btn-outline"><i class="fa-regular fa-download"></i> Export JSON</button>
        <button id="resetAllBtn" class="btn-danger"><i class="fa-regular fa-trash-can"></i> Reset all data</button>
      </div>
      <p class="sidebar-hint">✨ Changes update preview instantly & auto-save</p>
    </aside>

    <!-- PREVIEW PANEL -->
    <main class="preview-panel">
      <div id="portfolioRoot" class="portfolio-container"></div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
